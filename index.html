<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Vinod</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --muted: #6b7280;
        --paper: #f7f4ee;
        --accent: #1d766f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(29, 118, 111, 0.10), transparent 42%),
          var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      nav {
        width: min(100%, 920px);
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
      }

      .brand {
        color: var(--ink);
        font-size: 0.95rem;
        font-weight: 780;
        text-decoration: none;
      }

      .links {
        display: flex;
        gap: 10px;
      }

      .links a {
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
        padding: 10px 14px;
        text-decoration: none;
      }

      .links a[aria-current="page"],
      .links a:hover {
        background: rgba(29, 118, 111, 0.10);
        color: var(--accent);
      }

      main {
        width: min(100%, 680px);
        margin: auto;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 7.5rem);
        line-height: 0.95;
        font-weight: 780;
        letter-spacing: 0;
      }

      p {
        max-width: 36rem;
        margin: 28px 0 0;
        color: var(--muted);
        font-size: clamp(1.05rem, 2.4vw, 1.25rem);
        line-height: 1.65;
      }

      .rule {
        width: 84px;
        height: 4px;
        margin-top: 34px;
        border-radius: 999px;
        background: var(--accent);
      }

      footer {
        width: min(100%, 920px);
        margin: 56px auto 0;
        text-align: right;
        color: rgba(32, 33, 36, 0.46);
        font-size: 0.85rem;
      }

      @media (max-width: 520px) {
        body {
          padding: 28px;
        }

        nav,
        .links {
          align-items: flex-start;
          flex-direction: column;
        }

        .links a {
          padding-left: 0;
        }

        footer {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <nav aria-label="Primary">
      <a class="brand" href="index.html">Vinod</a>
      <div class="links">
        <a href="index.html" aria-current="page">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
    <main aria-label="Greeting">
      <p class="eyebrow">A simple hello</p>
      <h1>Hello,<br>Vinod.</h1>
      <p>Minimal, calm, and ready to open in any browser.</p>
      <div class="rule" aria-hidden="true"></div>
    </main>
    <footer>Made with care</footer>
  </body>
</html>
