<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gallery Vinod</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #202124;
        --muted: #6b7280;
        --paper: #f7f4ee;
        --accent: #1d766f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 32px;
        background:
          linear-gradient(135deg, rgba(29, 118, 111, 0.10), transparent 42%),
          var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      nav {
        width: min(100%, 920px);
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
      }

      .brand {
        color: var(--ink);
        font-size: 0.95rem;
        font-weight: 780;
        text-decoration: none;
      }

      .links {
        display: flex;
        gap: 10px;
      }

      .links a {
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
        padding: 10px 14px;
        text-decoration: none;
      }

      .links a[aria-current="page"],
      .links a:hover {
        background: rgba(29, 118, 111, 0.10);
        color: var(--accent);
      }

      main {
        width: min(100%, 920px);
        margin: auto;
        padding: 72px 0 24px;
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: clamp(2.75rem, 8vw, 5.8rem);
        line-height: 0.98;
        font-weight: 780;
        letter-spacing: 0;
      }

      p {
        max-width: 39rem;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(1.05rem, 2.4vw, 1.2rem);
        line-height: 1.65;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        margin-top: 44px;
      }

      figure {
        margin: 0;
      }

      .frame {
        min-height: 220px;
        border: 1px solid rgba(32, 33, 36, 0.10);
        border-radius: 8px;
        box-shadow: 0 20px 60px rgba(32, 33, 36, 0.08);
      }

      .frame.one {
        background:
          radial-gradient(circle at 24% 28%, rgba(255, 255, 255, 0.72) 0 12%, transparent 13%),
          linear-gradient(135deg, #f5d7b8, #dce8dc 54%, #4d938c);
      }

      .frame.two {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.55) 0 18%, transparent 18% 100%),
          linear-gradient(160deg, #24332f, #7eb2a6 58%, #f8efe2);
      }

      .frame.three {
        background:
          radial-gradient(circle at 78% 28%, rgba(29, 118, 111, 0.72) 0 14%, transparent 15%),
          linear-gradient(145deg, #fbfaf7, #c5d5cd 48%, #d7b98d);
      }

      figcaption {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.45;
      }

      footer {
        width: min(100%, 920px);
        margin: 56px auto 0;
        text-align: right;
        color: rgba(32, 33, 36, 0.46);
        font-size: 0.85rem;
      }

      @media (max-width: 760px) {
        .gallery {
          grid-template-columns: 1fr;
        }

        .frame {
          min-height: 180px;
        }
      }

      @media (max-width: 520px) {
        body {
          padding: 28px;
        }

        nav,
        .links {
          align-items: flex-start;
          flex-direction: column;
        }

        .links a {
          padding-left: 0;
        }

        main {
          padding-top: 56px;
        }

        footer {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <nav aria-label="Primary">
      <a class="brand" href="index.html">Vinod</a>
      <div class="links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html" aria-current="page">Gallery</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
    <main aria-label="Gallery">
      <p class="eyebrow">Gallery</p>
      <h1>A small visual collection.</h1>
      <p>Quiet compositions, warm tones, and a simple grid that keeps the page light.</p>
      <section class="gallery" aria-label="Featured gallery items">
        <figure>
          <div class="frame one" aria-hidden="true"></div>
          <figcaption>Soft morning palette with a clean, open feel.</figcaption>
        </figure>
        <figure>
          <div class="frame two" aria-hidden="true"></div>
          <figcaption>Deep contrast balanced by muted natural color.</figcaption>
        </figure>
        <figure>
          <div class="frame three" aria-hidden="true"></div>
          <figcaption>Minimal geometry with a calm focal point.</figcaption>
        </figure>
      </section>
    </main>
    <footer>Made with care</footer>
  </body>
</html>
